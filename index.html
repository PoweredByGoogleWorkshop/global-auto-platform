<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalAuto | Automate Everything Everywhere</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <nav class="p-6 flex justify-between items-center border-b border-slate-800">
        <div class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">GlobalAuto</div>
        <div class="space-x-4">
            <a href="#" class="text-sm hover:text-blue-400">Integrations</a>
            <a href="#" class="bg-blue-600 px-4 py-2 rounded-lg font-bold hover:bg-blue-700 transition">Get Started</a>
        </div>
    </nav>

    <header class="py-20 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6">Automate your world in <span class="text-blue-500">60 seconds.</span></h1>
        <p class="text-xl text-slate-400 max-w-2xl mx-auto mb-10">The first IFTTT alternative built for the global market. Support for WhatsApp, LINE, WeChat, and 500+ more.</p>
        
        <div class="max-w-xl mx-auto bg-slate-800 p-2 rounded-2xl flex items-center shadow-2xl border border-slate-700">
            <input type="text" placeholder="If I get a WhatsApp..." class="bg-transparent flex-1 px-4 outline-none text-lg">
            <button class="bg-emerald-500 text-slate-900 px-6 py-3 rounded-xl font-bold">Build It</button>
        </div>
    </header>

    <section class="py-10 bg-slate-800/50">
        <div class="container mx-auto text-center">
            <p class="text-slate-500 uppercase tracking-widest text-sm mb-6">Active in 150+ Countries</p>
            <div class="flex justify-center gap-8 opacity-50 grayscale hover:grayscale-0 transition cursor-default">
                <span>WhatsApp</span><span>Shopify</span><span>Telegram</span><span>Discord</span><span>Slack</span>
            </div>
        </div>
    </section>

</body>
</html>
